 <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Matheus & Sofia</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(#f8f1e9, #e8d9c7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .envelope-container {
      position: relative;
      width: 420px;
      height: 280px;
      cursor: pointer;
      transition: transform 0.6s ease;
    }

    .envelope {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #8fbaf5;
      border-radius: 8px 8px 0 0;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    /* Flap do envelope */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(#7aa8e0, #8fbaf5);
      clip-path: polygon(0 0, 50% 65%, 100% 0);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 3;
    }

    /* Flor no envelope (fechado) */
    .flower-envelope {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      z-index: 4;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    /* Convite dentro do envelope */
    .invitation {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 380px;
      height: 240px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      overflow: hidden;
      opacity: 0;
      transform: scale(0.7) translateY(80px);
      transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 2;
      background-image: url('https://i.imgur.com/3vKzL9p.png'); /* fundo texturizado opcional */
      background-size: cover;
    }

    /* Quando o envelope é aberto */
    .envelope-container.open .flap {
      transform: rotateX(-180deg) translateY(-20px);
    }

    .envelope-container.open .invitation {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Conteúdo do convite (igual ao PDF) */
    .invite-content {
      padding: 30px 25px 20px;
      text-align: center;
      color: #2c4a7c;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .invite-content h1 {
      font-size: 28px;
      margin: 10px 0;
      color: #2c4a7c;
    }

    .quote {
      font-style: italic;
      font-size: 15px;
      line-height: 1.4;
      margin: 15px 0 25px;
    }

    .couple {
      font-size: 32px;
      font-style: italic;
      margin: 20px 0;
      color: #2c4a7c;
    }

    .date {
      font-size: 18px;
      font-weight: bold;
      margin: 15px 0;
      color: #2c4a7c;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 20px 0;
    }

    .icon {
      width: 55px;
      height: 55px;
      background: #8fbaf5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }

    .click-hint {
      color: #5a7a9e;
      font-size: 14px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="envelope-container" id="envelope">
    <div class="envelope">
      <!-- Flor no envelope fechado -->
      <img src="https://i.imgur.com/3vKzL9p.png" class="flower-envelope" alt="Flor Azul">
      
      <!-- Flap -->
      <div class="flap"></div>

      <!-- Convite que sai de dentro -->
      <div class="invitation">
        <div class="invite-content">
          <!-- Flores do topo (igual ao convite) -->
          <div style="text-align:center; margin-bottom:10px;">
            <img src="https://i.imgur.com/3vKzL9p.png" style="width:180px; margin: -20px auto 0;" alt="Flores">
          </div>

          <h1>M|S</h1>
          
          <p class="quote">
            "Não existe felicidade maior do que o encontro de dois corações que há muito tempo se buscavam. 
            Juntos com nossas famílias, temos a honra de convidá-lo(a) para o nosso casamento."
          </p>

          <div class="couple">Matheus & Sofia</div>

          <div class="date">
            23 DE MAIO DE 2026<br>
            ÀS 19:00H
          </div>

          <div class="icons">
            <div class="icon">📍</div>
            <div class="icon">❤️</div>
            <div class="icon">🎁</div>
          </div>

          <div class="click-hint">CLIQUE PARA INTERAGIR!</div>
        </div>
      </div>
    </div>
  </div>
