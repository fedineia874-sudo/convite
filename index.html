<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Especial</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url('Cor.png');
background-size:cover;
background-position:center;
font-family:'Georgia', serif;
}

/* Cena */
.scene{
position:relative;
width:380px;
height:260px;
cursor:pointer;
}

/* Envelope base */
.envelope{
position:absolute;
width:100%;
height:100%;
background:#9fb3d1;
border-radius:10px;
box-shadow:0 25px 50px rgba(0,0,0,0.3);
overflow:hidden;
}

/* Detalhe inferior (triângulo) */
.envelope::before{
content:"";
position:absolute;
bottom:0;
width:100%;
height:100%;
background:#8ea4c6;
clip-path:polygon(0 100%,50% 55%,100% 100%);
}

/* Aba */
.flap{
position:absolute;
width:100%;
height:100%;
background:#7e97bd;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
z-index:5;
}

/* Convite */
.card{
position:absolute;
width:280px;
height:380px;
background:white;
left:50%;
transform:translateX(-50%) translateY(160px);
top:40px;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
padding:25px;
text-align:center;
transition:1s;
z-index:1;
}

/* Texto */
.card h1{
font-size:22px;
color:#2f3e5e;
}

/* Botão */
.botao{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#2f3e5e;
color:white;
text-decoration:none;
border-radius:6px;
}

/* Flor */
.flower{
position:absolute;
width:110px;
bottom:-25px;
right:-25px;
}

/* Animação */
.scene.open .flap{
transform:rotateX(180deg);
}

.scene.open .card{
transform:translateX(-50%) translateY(-140px);
}
</style>
</head>

<body>

<div class="scene" onclick="this.classList.toggle('open')">

<div class="envelope">
<div class="flap"></div>

<div class="card">
<h1>Convite Especial</h1>
<p>Você está sendo convidado(a) para um momento inesquecível.</p>

<a class="botao" href="convite.pdf" target="_blank">
Abrir Convite
</a>

<img class="flower" src="flor.png">
</div>

</div>

</div>

</body>
</html>
