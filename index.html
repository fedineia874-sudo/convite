<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Envelope Interativo</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #8fbaf5;
    font-family: Arial;
  }

  .envelope {
    position: relative;
    width: 300px;
    height: 200px;
    background: ##8fbaf5;
    cursor: pointer;
  }

  .flap {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-bottom: 100px solid #c0392b;
    top: -100px;
    transform-origin: bottom;
    transition: transform 1s;
  }

  .letter {
    position: absolute;
    width: 260px;
    height: 160px;
    background: white;
    top: 20px;
    left: 20px;
    text-align: center;
    padding-top: 50px;
    box-sizing: border-box;
    transition: transform 1s;
  }

  .open .flap {
    transform: rotateX(180deg);
  }

  .open .letter {
    transform: translateY(-120px);
  }
</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope(this)">
  <div class="flap"></div>
  <div class="letter">
  <a href="convite.pdf" target="_blank" style="text-decoration:none; color:black;">
    📄 Clique para abrir seu convite
  </a>
</div>
   
</div>

<script>
function openEnvelope(el) {
  el.classList.toggle("open");
}
</script>

</body>
</html>
