<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Premium</title><style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #bcd6fb, #8fbaf5);
  overflow: hidden;
  font-family: 'Georgia', serif;
}

.scene {
  perspective: 1600px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.envelope {
  width: 95vw;
  max-width: 650px;
  aspect-ratio: 16/10;
  position: relative;
}

.envelope img {
  width: 100%;
  border-radius: 18px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.4);
}

/* ABA (AGORA É CLICÁVEL) */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(0,0,0,0.08));
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: transform 1.3s cubic-bezier(.68,-0.55,.27,1.55);
  cursor: pointer;
}

.envelope.open .flap {
  transform: rotateX(-180deg);
}

/* LACRE */
.seal {
  position: absolute;
  width: 85px;
  height: 85px;
  background: radial-gradient(circle, #ffd700, #caa64b);
  border-radius: 50%;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: all 0.6s ease;
  pointer-events: none;
}

.envelope.open .seal {
  transform: translate(-50%, -250%) scale(0);
  opacity: 0;
}

.seal::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
  animation: brilho 2s infinite;
}

@keyframes brilho {
  0% {opacity: 0}
  50% {opacity: 1}
  100% {opacity: 0}
}

/* CARTÃO */
.card {
  position: absolute;
  width: 92%;
  height: 150%;
  left: 4%;
  top: 5%;
  background: white;
  border-radius: 14px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  transform: translateY(120px);
  opacity: 0;
  transition: 1.2s ease;
  overflow: hidden;
}

.envelope.open .card {
  transform: translateY(-140%);
  opacity: 1;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  pointer-events: none;
}

.envelope.open iframe {
  pointer-events: auto;
}

/* TEXTO */
.hint {
  position: absolute;
  bottom: -45px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 16px;
  letter-spacing: 1px;
}

</style></head><body><div class="scene">
  <div class="envelope"><img src="envelope.png" alt="Envelope">

<!-- CLIQUE SOMENTE NA ABA -->
<div class="flap" onclick="abrir(this.parentElement)"></div>

<div class="seal"></div>

<div class="card" onclick="event.stopPropagation()">
  <iframe src="convite.pdf"></iframe>
</div>

<div class="hint">Toque na aba para abrir ✉️</div>

  </div>
</div><script>
function abrir(el) {
  el.classList.toggle("open");
}
</script></body>
</html>
