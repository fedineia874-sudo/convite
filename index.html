<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite de Casamento • Matheus & Sofia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&display=swap');

    :root {
      --blue: #8fbaf5;
      --deep-blue: #2a5d9e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #d0e6ff, #a5c8f5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      overflow: hidden;
      position: relative;
    }

    .envelope-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      cursor: pointer;
      z-index: 10;
    }

    .envelope {
      width: 100%;
      height: 520px;
      position: relative;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 25px 40px rgba(42, 93, 158, 0.35));
    }

    .envelope:hover { transform: scale(1.04); }

    /* Base do envelope */
    .base {
      position: absolute;
      inset: 0;
      background: #8fbaf5;
      border-radius: 12px 12px 60px 60px;
      box-shadow: 
        inset 0 0 60px rgba(255,255,255,0.6),
        0 20px 35px rgba(42, 93, 158, 0.3);
      overflow: hidden;
    }

    /* Aba do envelope (flap) */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 58%;
      background: linear-gradient(#7eb0f0, #6a9de8);
      clip-path: polygon(0 0, 100% 0, 50% 70%);
      transform-origin: top;
      transition: transform 1.8s cubic-bezier(0.65, 0.05, 0.35, 1);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.25);
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .envelope.open .flap {
      transform: rotateX(-178deg);
    }

    /* Selo de cera azul */
    .seal {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translateX(-50%);
      width: 92px;
      height: 92px;
      background: #2a5d9e;
      border-radius: 50%;
      box-shadow: 
        0 8px 16px rgba(0, 0, 0, 0.3),
        inset 0 4px 8px rgba(255,255,255,0.3),
        inset 0 -4px 8px rgba(0,0,0,0.3);
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    }

    /* Flores azuis na parte inferior direita */
    .flowers {
      position: absolute;
      bottom: 12%;
      right: 8%;
      font-size: 68px;
      line-height: 1;
      z-index: 2;
      filter: drop-shadow(0 8px 12px rgba(42, 93, 158, 0.4));
      pointer-events: none;
    }

    /* Carta que sobe */
    .letter {
      position: absolute;
      top: 22%;
      left: 8%;
      width: 84%;
      height: 70%;
      background: #fffdf7;
      border: 5px solid #2a5d9e;
      border-radius: 12px;
      padding: 38px 26px;
      box-shadow: 0 25px 40px rgba(42, 93, 158, 0.45);
      z-index: 2;
      opacity: 0;
      transform: translateY(110px) scale(0.8);
      transition: all 1.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .envelope.open .letter {
      opacity: 1;
      transform: translateY(-32px) scale(1);
    }

    .letter-content h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 38px;
      color: #2a5d9e;
      margin-bottom: 12px;
    }

    .letter-content p {
      font-size: 21px;
      color: #2a5d9e;
      margin: 14px 0 28px;
      line-height: 1.45;
    }

    .letter-content .names {
      font-family: 'Dancing Script', cursive;
      font-size: 46px;
      color: #2a5d9e;
      margin: 10px 0 30px;
    }

    .open-pdf {
      background: #2a5d9e;
      color: white;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(42, 93, 158, 0.4);
      transition: all 0.3s ease;
    }

    .open-pdf:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(42, 93, 158, 0.5);
    }

    /* Fundo sutil */
    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .hint {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(42, 93, 158, 0.85);
      font-size: 15px;
      letter-spacing: 3px;
      text-shadow: 0 2px 6px rgba(255,255,255,0.6);
      z-index: 10;
      transition: opacity 0.8s ease;
    }

    .envelope.open .hint { opacity: 0; }
  </style>
</head>
<body>

  <div class="envelope-container" id="envelopeContainer">
    <div class="envelope" id="envelope">
      <div class="base">
        
        <!-- Aba do envelope -->
        <div class="flap" id="flap">
          <!-- Selo de cera azul -->
          <div class="seal">🌸</div>
        </div>

        <!-- Flores azuis decorativas -->
        <div class="flowers">🌸💙🌼</div>

        <!-- Carta que sobe -->
        <div class="letter" id="letter">
          <div class="letter-content">
            <h1>Convite Especial</h1>
            <p>Você está sendo convidado(a)</p>
            <div class="names">Matheus &amp; Sofia</div>
            <a href="convite.pdf" target="_blank" class="open-pdf">
              ABRIR CONVITE COMPLETO
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">TOQUE PARA ABRIR</div>
  </div>

  <script>
    const envelopeContainer = document.getElementById('envelopeContainer');
    const envelope = document.getElementById('envelope');
    const flap = document.getElementById('flap');
    const letter = document.getElementById('letter');
    const hint = document.getElementById('hint');

    let isOpen = false;

    envelopeContainer.addEventListener('click', () => {
      if (!isOpen) {
        // Abre o envelope
        envelope.classList.add('open');
        isOpen = true;
        
        // Remove o texto "Toque para abrir"
        setTimeout(() => {
          hint.style.opacity = '0';
        }, 600);
      } else {
        // Fecha novamente (para permitir teste)
        envelope.classList.remove('open');
        isOpen = false;
        hint.style.opacity = '1';
      }
    });

    // Suporte a toque em dispositivos móveis
    let touchStart = 0;
    envelopeContainer.addEventListener('touchstart', (e) => {
      touchStart = Date.now();
    });

    envelopeContainer.addEventListener('touchend', (e) => {
      if (Date.now() - touchStart < 500) {
        envelopeContainer.click();
      }
    });

    // Partículas de brilho sutis
    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.style.position = 'absolute';
      sparkle.style.width = '5px';
      sparkle.style.height = '5px';
      sparkle.style.background = 'rgba(255,255,255,0.9)';
      sparkle.style.borderRadius = '50%';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.opacity = '0';
      sparkle.style.zIndex = '1';
      envelopeContainer.appendChild(sparkle);

      sparkle.animate([
        { transform: 'scale(0.2)', opacity: 0 },
        { transform: 'scale(1.2)', opacity: 1 },
        { transform: 'scale(0.2)', opacity: 0 }
      ], {
        duration: 1800 + Math.random() * 1200,
        easing: 'ease-out'
      });

      setTimeout(() => sparkle.remove(), 3000);
    }

    setInterval(() => {
      if (Math.random() > 0.6) createSparkle();
    }, 120);
  </script>
</body>
</html>
