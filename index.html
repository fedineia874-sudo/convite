<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Luxo</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #bcd6fb, #8fbaf5);
  font-family: 'Georgia', serif;
}

/* CENA */
.scene {
  perspective: 1600px;
}

/* ENVELOPE */
.envelope {
  width: 92vw;
  max-width: 650px;
  height: 380px;
  position: relative;
  cursor: pointer;
}

/* BASE */
.base {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #9fc6fa, #7daeea);
  border-radius: 14px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.35);
}

/* ABA */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #8fbaf5, #6fa4e0);
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: 1.3s cubic-bezier(.68,-0.55,.27,1.55);
}

.envelope.open .flap {
  transform: rotateX(-180deg);
}

/* LACRE */
.seal {
  width: 90px;
  height: 90px;
  background: radial-gradient(circle, #ffd700, #caa64b);
  border-radius: 50%;
  position: absolute;
  top: 48%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.6s;
}

.envelope.open .seal {
  transform: translate(-50%, -250%) scale(0);
  opacity: 0;
}

/* FLORES */
.flowers {
  position: absolute;
  width: 70%;
  right: -5%;
  bottom: -10px;
  pointer-events: none;
  transition: 1s;
}

.envelope.open .flowers {
  transform: translateY(10px) scale(1.05);
}

/* CARTA */
.card {
  position: absolute;
  width: 90%;
  height: 150%;
  left: 5%;
  top: 10%;
  background: white;
  border-radius: 12px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  transform: translateY(120px);
  opacity: 0;
  transition: 1.2s;
  overflow: hidden;
}

.envelope.open .card {
  transform: translateY(-140%);
  opacity: 1;
}

/* PDF */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  pointer-events: none;
}

.envelope.open iframe {
  pointer-events: auto;
}

/* TEXTO */
.hint {
  position: absolute;
  bottom: -45px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 16px;
  letter-spacing: 1px;
}
</style>
</head>

<body>

<div class="scene">
  <div class="envelope" onclick="abrir(this)">

    <div class="base"></div>
    <div class="flap"></div>
    <div class="seal"></div>

    <!-- FLORES -->
    <img src="flores.png" class="flowers">

    <!-- CONVITE -->
    <div class="card" onclick="event.stopPropagation()">
      <iframe src="convite.pdf"></iframe>
    </div>

    <div class="hint">Toque para abrir ✨</div>

  </div>
</div>

<script>
function abrir(el) {
  el.classList.toggle("open");
}
</script>

</body>
</html>
