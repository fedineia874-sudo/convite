<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Convite Luxuoso</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #8fbaf5;
  font-family: Arial;
}.scene { perspective: 1200px; }

.envelope { width: 400px; height: 260px; position: relative; transform-style: preserve-3d; cursor: pointer; }

.base { position: absolute; width: 100%; height: 100%; }

.base img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.25); }

.flap { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.05); clip-path: polygon(0 0, 100% 0, 50% 60%); transform-origin: top; transition: transform 1s ease; }

.envelope.open .flap { transform: rotateX(-180deg); }

.card { position: absolute; width: 90%; height: 220px; background: white; left: 5%; top: 20px; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 1s ease; }

.envelope.open .card { transform: translateY(-140px); opacity: 1; }

iframe { width: 100%; height: 100%; border: none; border-radius: 6px; }

.hint { position: absolute; bottom: -40px; width: 100%; text-align: center; color: white; font-size: 14px; opacity: 0.8; }

</style>
</head>
<body><div class="scene">
  <div class="envelope" onclick="openEnvelope(this)">
    <div class="base">
      <img src="envelope.png" alt="Envelope">
    </div><div class="flap"></div>

<div class="card">
  <iframe src="convite.pdf"></iframe>
</div>

<div class="hint">Clique para abrir ✉️</div>

  </div>
</div><script>
function openEnvelope(el) {
  el.classList.toggle('open');
}
</script></body>
</html>
