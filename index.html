<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Especial</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url('Cor.png');
background-size:cover;
background-position:center;
font-family: 'Georgia', serif;
}

/* Container */
.scene{
position:relative;
width:340px;
height:220px;
}

/* Envelope */
.envelope{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#a9bddc,#8fa7cc);
border-radius:8px;
box-shadow:0 25px 50px rgba(0,0,0,0.3);
overflow:hidden; /* ISSO ESCONDE O CONVITE */
cursor:pointer;
}

/* Aba */
.flap{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#8fa7cc,#7e97bd);
clip-path:polygon(0 0,100% 0,50% 65%);
transform-origin:top;
transition:1s;
z-index:3;
}

/* Convite */
.card{
position:absolute;
width:300px;
height:400px;
background:white;
left:20px;
top:220px; /* COMEÇA ESCONDIDO DENTRO */
border-radius:10px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
padding:25px;
text-align:center;
transition:1s;
z-index:1;
}

/* Texto */
.card h1{
font-size:22px;
color:#2f3e5e;
}

/* Botão */
.botao{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#2f3e5e;
color:white;
text-decoration:none;
border-radius:6px;
}

/* Flor */
.flower{
position:absolute;
width:120px;
bottom:-30px;
right:-30px;
}

/* Quando abre */
.scene.open .flap{
transform:rotateX(180deg);
}

.scene.open .card{
top:-180px; /* SOBE PARA FORA */
}
</style>
</head>

<body>

<div class="scene" onclick="this.classList.toggle('open')">

<div class="envelope">
<div class="flap"></div>
</div>

<div class="card">
<h1>Convite Especial</h1>
<p>Você está sendo convidado(a) para um momento inesquecível.</p>

<a class="botao" href="convite.pdf" target="_blank">
Abrir Convite
</a>

<img class="flower" src="flor.png">
</div>

</div>

</body>
</html>
